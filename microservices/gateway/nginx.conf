worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
    client_max_body_size 20m;

    # ── Upstream services ──────────────────────────────────────────────────────
    upstream core_service {
        keepalive 32;
        server core-service:3001;
    }
    upstream integration_service {
        keepalive 16;
        server integration-service:3002;
    }
    upstream activity_service {
        keepalive 16;
        server activity-service:3003;
    }
    upstream frontend {
        server frontend:5173;
    }

    server {
        listen 3000;
        server_name localhost;

        # ── Health check ───────────────────────────────────────────────────────
        location /up {
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }

        # ── Core Service routes ────────────────────────────────────────────────
        # Tickets, Users, Auth, SLA, Timesheets, Master Data, Notifications
        location ~ ^/api/(health|db-test|auth|users|tickets|notifications|timesheets|time-cards|leaderboard|custom-dropdowns|companies|feature-permissions|incident-categories|master-data) {
            proxy_pass         http://core_service;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ── Integration Service routes ─────────────────────────────────────────
        # Email, Graph API, AI, Webhooks
        location ~ ^/api/(email|email-configs|m365|graph|ai|webhooks) {
            proxy_pass         http://integration_service;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # ── Activity Service routes ────────────────────────────────────────────
        # Activity tracking, screenshots, work sessions, work notes
        location ~ ^/api/(activity-sessions|activity-entries|work-sessions|work-notes|message-history|upload-screenshot|input-stats|capture-screen) {
            proxy_pass         http://activity_service;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
            client_max_body_size 20m;
        }

        # ── Static uploads ─────────────────────────────────────────────────────
        location /uploads {
            proxy_pass http://activity_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /captures {
            proxy_pass http://activity_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── React Frontend (all other routes) ─────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }
    }
}
